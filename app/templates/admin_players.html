{% extends "base.html" %}
{% block title %}Manage Players{% endblock %}
{% block content %}
<h2>Manage Players</h2>

<article>
    <header><strong>Add Player</strong></header>
    <form method="post" action="/admin/players/add">
        <div class="grid">
            <label>
                Name
                <input type="text" name="name" required>
            </label>
            <label>
                Age Range
                <select name="age_range">
                    <option value="">—</option>
                    <option value="16-20">16-20</option>
                    <option value="20-25">20-25</option>
                    <option value="25-30">25-30</option>
                    <option value="30-35">30-35</option>
                    <option value="35-40">35-40</option>
                    <option value="40+">40+</option>
                </select>
            </label>
            <label>
                USP (unique selling point)
                <input type="text" name="usp" placeholder="e.g. Lethal left foot, best crosser">
            </label>
        </div>
        <button type="submit">Add Player</button>
    </form>
</article>

<h3>Current Players</h3>
{% for player in players %}
<article>
    <form method="post" action="/admin/players/{{ player.id }}/edit">
        <div class="grid">
            <label>
                Name
                <input type="text" name="name" value="{{ player.name }}" required>
            </label>
            <label>
                Age Range
                <select name="age_range">
                    <option value="">—</option>
                    {% for r in ["16-20", "20-25", "25-30", "30-35", "35-40", "40+"] %}
                    <option value="{{ r }}" {% if player.age_range == r %}selected{% endif %}>{{ r }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>
                USP
                <input type="text" name="usp" value="{{ player.usp or '' }}">
            </label>
            <label>
                Active
                <input type="checkbox" name="is_active" value="true" role="switch"
                       {% if player.is_active %}checked{% endif %}>
            </label>
        </div>
        <button type="submit" class="secondary">Save</button>
    </form>
</article>
{% endfor %}
{% endblock %}
