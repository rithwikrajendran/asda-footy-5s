<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ASDA Footy 5s{% endblock %}</title>
    <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><a href="/" style="text-decoration:none;display:flex;align-items:center;gap:8px">
                <img src="/static/logo.svg" alt="logo" style="height:28px">
                <strong>ASDA Footy 5s</strong>
            </a></li>
        </ul>
        <ul>
            <li><a href="/">Table</a></li>
            <li><a href="/ratings">Ratings</a></li>
            <li><a href="/matches">Matches</a></li>
            {% if user %}
                <li><a href="/rate">Rate</a></li>
                {% if user.is_admin %}
                    <li><a href="/admin/players">Players</a></li>
                    <li><a href="/admin/generate">Generator</a></li>
                    <li><a href="/admin/match">Record</a></li>
                {% endif %}
                <li><a href="/logout" style="opacity:0.6">{{ user.github_username }}</a></li>
            {% else %}
                <li><a href="/login">Login</a></li>
            {% endif %}
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container" style="text-align:center;opacity:0.3;padding:2rem 0;font-size:0.8em">
        ASDA Footy 5s
    </footer>
</body>
</html>
